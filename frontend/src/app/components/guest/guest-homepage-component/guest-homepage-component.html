<h3>We have {{totalWorkspaceCnt}} registered workspaces on our platform!</h3>
<h1>Top 5 workspaces</h1>
<table>
    <tr>
        <th>Name</th>
        <th>City</th>
        <th>Address</th>
        <th>Number of likes</th>
    </tr>
    @for(ws of top5Workspaces; track ws.workspaceName){
    <tr>
        <td>{{ws.workspaceName}}</td>
        <td>{{ws.city}}</td>
        <td>{{ws.address}}</td>
        <td>{{ws.likesCount}}</td>
    </tr>
}
</table>
