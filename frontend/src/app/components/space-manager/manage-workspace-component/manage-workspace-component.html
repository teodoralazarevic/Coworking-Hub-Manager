<div class="form-container">

<h1>Create Workspace</h1>

<section class="form-section">
<h2>Basic Information</h2>

<div class="form-grid">

<div class="form-group">
<label>Workspace name</label>
<input type="text" required [(ngModel)]="newWorkspace.workspaceName">
</div>

<div class="form-group">
<label>City</label>
<input type="text" required [(ngModel)]="newWorkspace.city">
</div>

<div class="form-group">
<label>Address</label>
<input type="text" required [(ngModel)]="newWorkspace.address">
</div>

<div class="form-group">
<label>Price per Hour (RSD)</label>
<input type="number" required [(ngModel)]="newWorkspace.pricePerHour">
</div>

<div class="form-group">
<label>Penalty points</label>
<input type="number" required [(ngModel)]="newWorkspace.penaltyPoints">
</div>

<div class="form-group">
<label>Open Space Desks</label>
<input type="number" min="1" required [(ngModel)]="newWorkspace.openSpace.desks">
</div>

</div>

<div class="form-group">
<label>Description</label>
<textarea rows="4" [(ngModel)]="newWorkspace.description"></textarea>
</div>

</section>


<section class="form-section">

<h2>Offices</h2>

<div class="form-inline">

<div class="form-group">
<label>Office Name</label>
<input type="text" [(ngModel)]="office.name">
</div>

<div class="form-group">
<label>Number of Desks</label>
<input type="number" min="1" [(ngModel)]="office.desks">
</div>

</div>

<button class="btn-primary" (click)="addOffice()">Add Office</button>

</section>


<section class="form-section">

<h2>Conference Rooms</h2>

<div class="form-group">
<label>Room Name</label>
<input type="text" [(ngModel)]="confRoom.name">
</div>

<div class="form-group">
<label>Additional Equipment (max 300 characters)</label>
<textarea maxlength="300" rows="3" [(ngModel)]="confRoom.equipment"></textarea>
</div>

<small class="hint">
Conference rooms are assumed to have 10–12 seats.
</small>

<button class="btn-primary" (click)="addConfRoom()">Add Conference Room</button>

</section>


<section class="form-section">

<h2>Photos</h2>

<input type="file" (change)="onFilesSelected($event)" multiple accept="image/*">

</section>


<div class="submit-section">

<button class="btn-primary big" (click)="addWorkspace()">
Save Workspace
</button>

</div>

<span class="errorMessage">{{errorMessage}}</span>
<span class="successMessage">{{successMessage}}</span>

</div>
