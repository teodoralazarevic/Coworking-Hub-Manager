<mat-toolbar class="guest-header">

  <div class="logo" (click)="goHome()">
    <mat-icon class="logo-icon">apartment</mat-icon>
    <span class="logo-text">Coworking Hub Manager</span>
  </div>

  <span class="spacer"></span>

  <nav class="nav-links">
    <button mat-stroked-button routerLink="/member/profile">
      <mat-icon>person</mat-icon>
      Profile
    </button>

    <button mat-stroked-button routerLink="/member/search">
      <mat-icon>search</mat-icon>
      Search
    </button>

    <button mat-button color="primary" (click)="logout()">
      <mat-icon>logout</mat-icon>
      Logout
    </button>
  </nav>

</mat-toolbar>

<main class="guest-content">
  <router-outlet></router-outlet>
</main>

<footer class="guest-footer">
  <div class="footer-content">
    <span>© 2026 Coworking Hub Manager</span>
    <span class="footer-links">
      <a routerLink="/member/search">Find workspace</a>
      •
      <a (click)="logout()">Logout</a>
    </span>
  </div>
</footer>
