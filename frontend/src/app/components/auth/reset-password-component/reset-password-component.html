<div class="login-container">
    <h1>Reset password</h1>
    New password: <input type="password" [(ngModel)]="password1"> <br>
    Confirm new password: <input type="password" [(ngModel)]="password2"> <br>
    <button (click)="changePassword()">Change my password</button> <br>
    <span [class]="errorMessage">{{errorMessage}}</span> <br>
    <span [class]="successMessage">{{successMessage}}</span>
</div>
